<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Algorithm Visualizer</title>
    <!-- Cytoscape JS & Extensions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-edgehandles@4.0.1/cytoscape-edgehandles.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Controls Panel -->
        <aside class="controls-panel">
            <h1>Graph Visualizer</h1>
            
            <div class="control-group">
                <h3>Build Graph</h3>
                <div style="margin-bottom: 10px;">
                    <button class="btn" id="btn-add-node" style="background: #e6b31e; color: #0b0c10; font-size: 1.1em;">+ Spawn New Node Instantly</button>
                </div>
                <div class="interaction-mode">
                    <button class="mode-btn active" id="mode-move">✋ Move</button>
                    <button class="mode-btn" id="mode-edge">➚ Draw Edge</button>
                </div>
                <div class="edge-weight-input" style="flex-wrap: wrap;">
                    <label for="edge-weight" style="width: 100%;">Default Edge Weight:</label>
                    <input type="number" id="edge-weight" value="1" min="1" style="flex: 1; margin-top: 5px;">
                    <div style="width: 100%; font-size: 0.75rem; color: #a5a6a7; margin-top: 5px; text-align: center;">(Tip: Tap any drawn edge on the canvas to edit its weight directly)</div>
                </div>
                <button id="btn-clear" class="btn btn-danger">Clear Graph</button>
            </div>

            <div class="control-group">
                <h3>Algorithms</h3>
                <div class="params">
                    <label>Start Node: <select id="algo-start"><option value="">Select a node</option></select></label>
                </div>
                <button id="btn-dijkstra" class="btn btn-primary">Run Dijkstra</button>
                <button id="btn-prim" class="btn btn-primary">Run Prim</button>
                <button id="btn-kruskal" class="btn btn-primary">Run Kruskal</button>
            </div>

            <div class="control-group player-controls">
                <h3>Animation</h3>
                <div class="player-buttons">
                    <button id="btn-play" class="btn-icon" disabled>▶ Play</button>
                    <button id="btn-pause" class="btn-icon" disabled>⏸ Pause</button>
                    <button id="btn-step" class="btn-icon" disabled>⏭ Step</button>
                    <button id="btn-reset" class="btn-icon" disabled>🔄 Reset</button>
                </div>
            </div>

            <div class="status-panel">
                <h3>Log / Status</h3>
                <p id="status-text">Ready. Click on the canvas to add nodes.</p>
            </div>
        </aside>

        <!-- Graph Container -->
        <main id="cy-container"></main>
    </div>

    <!-- Scripts -->
    <script src="js/algorithms.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
